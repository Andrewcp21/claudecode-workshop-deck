<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <style>
    body { font-family: monospace; text-align: center; margin: 0; padding: clamp(20px, 6vw, 50px); background: white; color: black; }
    h1 { font-size: clamp(18px, 5vw, 24px); }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: min(320px, 90vw);
      gap: 0;
      margin: 20px auto;
    }
    .cell {
      aspect-ratio: 1;
      width: 100%;
      border: 2px solid black;
      font-size: clamp(28px, 10vw, 48px); font-weight: bold;
      cursor: pointer; background: white; color: black;
      touch-action: manipulation;
    }
    .cell:hover { background: #eee; }
    #status { font-size: clamp(14px, 4vw, 18px); margin: 10px; }
    button { font-size: clamp(13px, 3.5vw, 16px); padding: 8px 20px; cursor: pointer; border: 2px solid black; background: white; touch-action: manipulation; }
    button:hover { background: black; color: white; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status">Player X's turn</div>
  <div id="board">
    <button class="cell" onclick="play(0)"></button>
    <button class="cell" onclick="play(1)"></button>
    <button class="cell" onclick="play(2)"></button>
    <button class="cell" onclick="play(3)"></button>
    <button class="cell" onclick="play(4)"></button>
    <button class="cell" onclick="play(5)"></button>
    <button class="cell" onclick="play(6)"></button>
    <button class="cell" onclick="play(7)"></button>
    <button class="cell" onclick="play(8)"></button>
  </div>
  <br>
  <button onclick="reset()">Reset</button>

  <script>
    let board = Array(9).fill('');
    let current = 'X';
    let over = false;
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function play(i) {
      if (over || board[i]) return;
      board[i] = current;
      document.querySelectorAll('.cell')[i].textContent = current;
      const winner = checkWin();
      if (winner) {
        document.getElementById('status').textContent = 'Player ' + winner + ' wins!';
        over = true;
        if (window.showLanjut) showLanjut();
      } else if (board.every(c => c)) {
        document.getElementById('status').textContent = "It's a draw!";
        over = true;
        if (window.showLanjut) showLanjut();
      } else {
        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent = "Player " + current + "'s turn";
      }
    }

    function checkWin() {
      for (const [a,b,c] of wins)
        if (board[a] && board[a] === board[b] && board[b] === board[c]) return board[a];
      return null;
    }

    function reset() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      document.querySelectorAll('.cell').forEach(c => c.textContent = '');
      document.getElementById('status').textContent = "Player X's turn";
    }
  </script>
  <script src="nav.js"></script>
</body>
</html>
