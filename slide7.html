<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Sesi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 120px;
    }

    .heading {
      font-size: 28px;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 36px;
      text-align: center;
    }

    .prompt-wrap {
      width: 100%;
      max-width: 560px;
      display: flex;
      border: 1.5px solid #d4d4d4;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .prompt-wrap:focus-within { border-color: #333; }

    .prompt-input {
      flex: 1;
      padding: 12px 16px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #111;
      border: none;
      outline: none;
      background: transparent;
    }

    .prompt-input::placeholder { color: #bbb; }

    .inspire-btn {
      padding: 12px 18px;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: background 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .inspire-btn:hover { background: #333; }
    .inspire-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* response */
    .response {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
      display: none;
    }

    .response.visible { display: block; }

    .response-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .response-box {
      background: #f7f7f8;
      border-radius: 8px;
      padding: 20px 22px;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a;
      font-weight: 300;
      white-space: pre-wrap;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .response-box:hover {
      background: #f0f0f2;
      box-shadow: 0 0 0 2px #111;
    }

    .response-box::after {
      content: '↑ klik untuk pakai';
      position: absolute;
      bottom: 10px;
      right: 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: #bbb;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .response-box:hover::after { opacity: 1; }

    .error-box {
      background: #fff2f2;
      border: 1px solid #ffc0c0;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 13px;
      color: #c00;
      display: none;
      margin-top: 16px;
      max-width: 560px;
      width: 100%;
    }

    /* cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #555;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* meme pop */
    #meme-pop {
      position: fixed;
      bottom: -260px;
      left: 50%;
      transform: translateX(-50%) scale(0.6);
      width: 220px;
      border-radius: 12px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.25);
      z-index: 99998;
      opacity: 0;
      transition: none;
      pointer-events: none;
    }

    #meme-pop.pop {
      animation: meme-bounce 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    #meme-pop.hide {
      animation: meme-exit 0.35s ease-in forwards;
    }

    @keyframes meme-bounce {
      0%   { bottom: -260px; opacity: 0; transform: translateX(-50%) scale(0.6); }
      100% { bottom: 100px;  opacity: 1; transform: translateX(-50%) scale(1); }
    }

    @keyframes meme-exit {
      0%   { bottom: 100px; opacity: 1; transform: translateX(-50%) scale(1); }
      100% { bottom: -260px; opacity: 0; transform: translateX(-50%) scale(0.7); }
    }

    /* floating submit button */
    #submit-btn {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: #111;
      color: #fff;
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      font-size: 15px;
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      z-index: 99999;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18);
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
      transition: opacity 0.25s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.15s;
      touch-action: manipulation;
    }

    #submit-btn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    #submit-btn:hover  { background: #333; }
    #submit-btn:active { transform: translateY(0) scale(0.97); }

    @media (max-width: 640px) {
      body { padding: 36px 16px 120px; }
      .heading { font-size: 22px; }
      .prompt-input { font-size: 16px; }
      .response-box { font-size: 13px; padding: 16px 16px 28px; }
      #submit-btn {
        bottom: 80px;
        right: 50%;
        transform: translateX(50%) translateY(16px);
        width: calc(100% - 48px);
        text-align: center;
      }
      #submit-btn.show { transform: translateX(50%) translateY(0); }
      #submit-btn:active { transform: translateX(50%) translateY(0) scale(0.97); }
    }
  </style>
</head>
<body>

  <h1 class="heading">Gimana sesi hari ini? 👇</h1>
  <p class="sub">ceritain — AI akan bantu poles jadi review keren</p>

  <div class="prompt-wrap">
    <input
      class="prompt-input"
      id="main-input"
      type="text"
      placeholder="Tulis pengalamanmu…"
      autocomplete="off"
    />
    <button class="inspire-btn" id="send-btn">Butuh Inspirasi ✨</button>
  </div>

  <div class="response" id="response">
    <p class="response-label">inspirasi — klik untuk pakai</p>
    <div class="response-box" id="response-text"></div>
  </div>

  <div class="error-box" id="error-box"></div>

  <button id="submit-btn">Kirim Feedback →</button>
  <img id="meme-pop" src="images/makasih-doang-undangan.jpg" alt="makasih doang?" />

<script src="env.js"></script>
<script>
  let running = false;

  const INSPIRATION_PROMPT = "Tulis satu paragraf pendek (3-4 kalimat) feedback workshop Claude Code yang terasa casual dan natural, seperti orang beneran nulis review — bukan template. Wajib sebut 'Cokro' sebagai instrukturnya dengan cara yang hangat dan spesifik. Fokus ke hal konkret yang berkesan dari workshop (misal: langsung praktek, materi relevan, insight tentang AI). Bahasa Indonesia gaul/santai, bukan formal. Hanya tulis teks feedbacknya saja.";

  async function generate() {
    if (running) return;

    running = true;
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    const errorBox = document.getElementById('error-box');
    errorBox.style.display = 'none';

    const responseEl = document.getElementById('response');
    const textEl = document.getElementById('response-text');
    textEl.innerHTML = '';
    responseEl.classList.add('visible');

    try {
      const apiKey = (typeof ENV !== 'undefined' && ENV.ANTHROPIC_API_KEY) || '';
      let responseText;

      if (apiKey) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 1024,
            messages: [{ role: 'user', content: INSPIRATION_PROMPT }],
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
        responseText = data.content[0].text;
      } else {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: INSPIRATION_PROMPT }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
        responseText = data.text;
      }

      typewrite(textEl, responseText);

    } catch (e) {
      responseEl.classList.remove('visible');
      showError(e.message || 'Terjadi kesalahan. Coba lagi.');
    } finally {
      running = false;
      btn.disabled = false;
      btn.textContent = 'Butuh Inspirasi ✨';
    }
  }

  function typewrite(el, text) {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    const iv = setInterval(() => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
      } else {
        clearInterval(iv);
        cursor.remove();
      }
    }, 18);
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  // Click inspiration → fill input
  document.getElementById('response-text').addEventListener('click', () => {
    const text = document.getElementById('response-text').textContent.trim();
    if (!text) return;
    const input = document.getElementById('main-input');
    input.value = text;
    input.focus();
    updateSubmitBtn();
  });

  // Show/hide floating submit based on input content
  function updateSubmitBtn() {
    const val = document.getElementById('main-input').value.trim();
    document.getElementById('submit-btn').classList.toggle('show', val.length > 0);
  }

  document.getElementById('main-input').addEventListener('input', updateSubmitBtn);

  document.getElementById('submit-btn').addEventListener('click', () => {
    const val = document.getElementById('main-input').value.trim();
    if (!val) return;

    navigator.clipboard.writeText(val).then(() => {
      const btn = document.getElementById('submit-btn');
      btn.textContent = 'Tersalin! ✓';
      setTimeout(() => { btn.textContent = 'Kirim Feedback →'; }, 2000);
    }).catch(() => {});

    popMeme();
  });

  function popMeme() {
    const meme = document.getElementById('meme-pop');
    meme.classList.remove('pop', 'hide');
    void meme.offsetWidth;
    meme.classList.add('pop');
    setTimeout(() => {
      meme.classList.remove('pop');
      meme.classList.add('hide');
    }, 3000);
  }

  document.getElementById('send-btn').addEventListener('click', generate);
</script>

<script src="nav.js"></script>
</body>
</html>
