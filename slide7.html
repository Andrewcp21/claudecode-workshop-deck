<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback Sesi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 64px;
    }

    .heading {
      font-size: 28px;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #bbb;
      text-transform: uppercase;
      margin-bottom: 36px;
      text-align: center;
    }

    .prompt-wrap {
      width: 100%;
      max-width: 560px;
      display: flex;
      border: 1.5px solid #d4d4d4;
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .prompt-wrap:focus-within { border-color: #333; }

    .prompt-input {
      flex: 1;
      padding: 12px 16px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: #111;
      border: none;
      outline: none;
      background: transparent;
    }

    .prompt-input::placeholder { color: #bbb; }

    .send-btn {
      padding: 12px 18px;
      background: #111;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: background 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .send-btn:hover { background: #333; }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* response */
    .response {
      width: 100%;
      max-width: 560px;
      margin-top: 28px;
      display: none;
    }

    .response.visible { display: block; }

    .response-box {
      background: #f7f7f8;
      border-radius: 8px;
      padding: 24px 26px;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a;
      font-weight: 300;
      white-space: pre-wrap;
    }

    .error-box {
      background: #fff2f2;
      border: 1px solid #ffc0c0;
      border-radius: 8px;
      padding: 16px 20px;
      font-size: 13px;
      color: #c00;
      display: none;
      margin-top: 16px;
      max-width: 560px;
      width: 100%;
    }

    /* cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #555;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .prompt-wrap.shake { animation: shake 0.35s ease; border-color: #e55 !important; }

    @media (max-width: 640px) {
      body { padding: 36px 16px 48px; }
      .heading { font-size: 22px; }
      .prompt-input { font-size: 16px; }
      .response-box { font-size: 13px; padding: 18px 16px; }
    }
  </style>
</head>
<body>

  <h1 class="heading">Gimana sesi hari ini? 👇</h1>
  <p class="sub">ceritain — AI akan bantu poles jadi review keren</p>

  <div class="prompt-wrap">
    <input
      class="prompt-input"
      id="main-input"
      type="text"
      placeholder="Tulis pengalamanmu…"
      autocomplete="off"
    />
    <button class="send-btn" id="send-btn">Butuh Inspirasi ✨</button>
  </div>

  <div class="response" id="response">
    <div class="response-box" id="response-text"></div>
  </div>

  <div class="error-box" id="error-box"></div>

<script src="env.js"></script>
<script>
  let running = false;

  async function generate() {
    const input = document.getElementById('main-input');
    const val = input.value.trim();
    if (running) return;
    if (!val) {
      const wrap = document.querySelector('.prompt-wrap');
      wrap.classList.remove('shake');
      void wrap.offsetWidth; // reflow to restart animation
      wrap.classList.add('shake');
      input.focus();
      setTimeout(() => wrap.classList.remove('shake'), 400);
      return;
    }

    running = true;
    const btn = document.getElementById('send-btn');
    btn.disabled = true;
    btn.textContent = 'Generating…';

    const errorBox = document.getElementById('error-box');
    errorBox.style.display = 'none';

    const responseEl = document.getElementById('response');
    const textEl = document.getElementById('response-text');
    textEl.innerHTML = '';
    responseEl.classList.add('visible');

    try {
      const apiKey = (typeof ENV !== 'undefined' && ENV.ANTHROPIC_API_KEY) || '';
      let responseText;

      if (apiKey) {
        // Local: call Anthropic directly using env.js key
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 1024,
            system: "You are a professional feedback writer who crafts enthusiastic, heartfelt session reviews. Based on the user's raw feedback, write an OVERLY positive, glowing, effusive review of this learning session. The review MUST: warmly and specifically thank 'Cokro' by name as an absolutely outstanding, life-changing instructor who clearly went above and beyond; amplify everything the user mentions to sound incredible; use 2-3 paragraphs; end with a strong personal recommendation. Sound genuine but extremely enthusiastic. Reply only in the same language as the user's input. Reply with only the polished review text, ready to copy and share.",
            messages: [{ role: 'user', content: val }],
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || `Error ${res.status}`);
        responseText = data.content[0].text;
      } else {
        // Deployed: use Vercel serverless function
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: val }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
        responseText = data.text;
      }

      typewrite(textEl, responseText);

    } catch (e) {
      responseEl.classList.remove('visible');
      showError(e.message || 'Terjadi kesalahan. Coba lagi.');
    } finally {
      running = false;
      btn.disabled = false;
      btn.textContent = 'Butuh Inspirasi ✨';
    }
  }

  function typewrite(el, text) {
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    el.appendChild(cursor);
    const iv = setInterval(() => {
      if (i < text.length) {
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
      } else {
        clearInterval(iv);
        cursor.remove();
      }
    }, 18);
  }

  function showError(msg) {
    const el = document.getElementById('error-box');
    el.textContent = '⚠ ' + msg;
    el.style.display = 'block';
  }

  document.getElementById('send-btn').addEventListener('click', generate);
  document.getElementById('main-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') generate();
  });
</script>

<script src="nav.js"></script>
</body>
</html>
