<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Red Hat Display', sans-serif;
      background: #f2f0f0;
      color: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 4vw, 40px) 16px;
      overflow-x: hidden;
    }

    .revou-accent {
      width: 64px; height: 64px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }

    h1 {
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .players {
      display: flex;
      align-items: center;
      gap: 24px;
      margin: 20px 0;
    }
    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: 12px;
      background: white;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.2s;
    }
    .player.active {
      border-color: #fede3e;
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(254,222,62,0.4);
    }
    .player img { width: 56px; height: 56px; object-fit: contain; }
    .player span { font-size: 12px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
    .vs {
      font-weight: 700;
      font-size: 18px;
      color: #000;
      font-family: 'Red Hat Display', sans-serif;
    }

    #status {
      font-size: 16px;
      font-weight: 400;
      color: #333;
      margin-bottom: 20px;
      min-height: 24px;
      transition: transform 0.2s;
    }
    #status.winner {
      font-weight: 700;
      font-size: 18px;
      color: #000;
      background: #fede3e;
      padding: 8px 20px;
      border-radius: 8px;
      animation: statusPop 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: min(354px, 92vw);
      gap: 8px;
      background: #000;
      padding: 8px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    .cell {
      aspect-ratio: 1;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
      padding: 10%;
      touch-action: manipulation;
    }
    .cell:hover:not(.taken) { background: #fef5bc; transform: scale(0.97); }
    .cell.taken { cursor: default; }
    .cell img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    /* Bounce animation for placed piece */
    @keyframes bounce {
      0%   { transform: scale(0) rotate(-10deg); opacity: 0; }
      50%  { transform: scale(1.3) rotate(4deg); opacity: 1; }
      70%  { transform: scale(0.88) rotate(-2deg); }
      85%  { transform: scale(1.08) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    .cell img.bounce {
      animation: bounce 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
    }

    /* Status pop */
    @keyframes statusPop {
      0%   { transform: scale(0.8); opacity: 0; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Win highlight pulse */
    @keyframes winPulse {
      0%, 100% { background: white; }
      50%       { background: #fede3e; }
    }
    .cell.win-cell {
      animation: winPulse 0.6s ease-in-out 3;
    }

    #reset-btn {
      font-family: 'Red Hat Display', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 12px 32px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #fede3e;
      color: #000;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    #reset-btn:hover { background: #f5d200; transform: scale(0.98); }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <div class="revou-accent">
    <img src="Revou Logo.png" alt="RevoU" style="width:48px;height:48px;object-fit:contain;">
  </div>

  <h1>Tic-Tac-Toe</h1>

  <div class="players">
    <div class="player active" id="player-binus">
      <img src="images/Logo_Binus_University.png" alt="BINUS">
      <span>BINUS</span>
    </div>
    <span class="vs">VS</span>
    <div class="player" id="player-itb">
      <img src="images/Logo_Institut_Teknologi_Bandung.png" alt="ITB">
      <span>ITB</span>
    </div>
  </div>

  <div id="status">BINUS's turn</div>

  <div id="board">
    <button class="cell" onclick="play(0)"></button>
    <button class="cell" onclick="play(1)"></button>
    <button class="cell" onclick="play(2)"></button>
    <button class="cell" onclick="play(3)"></button>
    <button class="cell" onclick="play(4)"></button>
    <button class="cell" onclick="play(5)"></button>
    <button class="cell" onclick="play(6)"></button>
    <button class="cell" onclick="play(7)"></button>
    <button class="cell" onclick="play(8)"></button>
  </div>

  <button id="reset-btn" onclick="reset()">New Game</button>

  <script>
    // ── Audio ────────────────────────────────────────────────────────────────
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playTone(freq, type, duration, gainVal = 0.3) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gain.gain.setValueAtTime(gainVal, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    }

    function soundPlace(player) {
      // BINUS: higher pitch, ITB: lower pitch
      const freq = player === BINUS ? 520 : 380;
      playTone(freq, 'sine', 0.18, 0.25);
      setTimeout(() => playTone(freq * 1.25, 'sine', 0.12, 0.15), 80);
    }

    function soundWin() {
      // Victory fanfare: ascending notes
      const notes = [523, 659, 784, 1047];
      notes.forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.3, 0.35), i * 100));
    }

    function soundDraw() {
      playTone(300, 'sawtooth', 0.4, 0.2);
      setTimeout(() => playTone(250, 'sawtooth', 0.5, 0.2), 150);
    }

    // ── Confetti ─────────────────────────────────────────────────────────────
    const canvas = document.getElementById('confetti-canvas');
    const c = canvas.getContext('2d');
    let particles = [];
    let animFrame = null;

    // RevoU brand colors + ITB blue + BINUS orange
    const confettiColors = ['#fede3e', '#000000', '#ef3d58', '#fcb031', '#1d6fbd', '#f65616'];

    function spawnConfetti() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      particles = [];
      for (let i = 0; i < 160; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: -10 - Math.random() * 200,
          w: 8 + Math.random() * 8,
          h: 6 + Math.random() * 6,
          color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
          angle: Math.random() * Math.PI * 2,
          spin: (Math.random() - 0.5) * 0.2,
          vx: (Math.random() - 0.5) * 4,
          vy: 2 + Math.random() * 4,
          opacity: 1
        });
      }
      if (animFrame) cancelAnimationFrame(animFrame);
      animateConfetti();
    }

    function animateConfetti() {
      c.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      for (const p of particles) {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08; // gravity
        p.angle += p.spin;
        if (p.y < canvas.height + 20) alive = true;
        if (p.y > canvas.height - 100) p.opacity -= 0.02;
        c.save();
        c.globalAlpha = Math.max(0, p.opacity);
        c.translate(p.x, p.y);
        c.rotate(p.angle);
        c.fillStyle = p.color;
        c.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        c.restore();
      }
      if (alive) animFrame = requestAnimationFrame(animateConfetti);
      else c.clearRect(0, 0, canvas.width, canvas.height);
    }

    // ── Game logic ───────────────────────────────────────────────────────────
    const BINUS = 'BINUS';
    const ITB = 'ITB';
    const logos = {
      BINUS: 'images/Logo_Binus_University.png',
      ITB: 'images/Logo_Institut_Teknologi_Bandung.png'
    };

    let board = Array(9).fill('');
    let current = BINUS;
    let over = false;
    const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function play(i) {
      if (over || board[i]) return;

      // Resume AudioContext on first interaction
      if (ctx.state === 'suspended') ctx.resume();

      board[i] = current;
      const cell = document.querySelectorAll('.cell')[i];
      const img = document.createElement('img');
      img.src = logos[current];
      img.alt = current;
      img.classList.add('bounce');
      cell.innerHTML = '';
      cell.appendChild(img);
      cell.classList.add('taken');

      soundPlace(current);

      const winLine = checkWin();
      const statusEl = document.getElementById('status');

      if (winLine) {
        // Highlight winning cells
        const cells = document.querySelectorAll('.cell');
        winLine.forEach(idx => cells[idx].classList.add('win-cell'));

        statusEl.textContent = current + ' wins!';
        statusEl.className = 'winner';
        over = true;
        setActive(null);
        setTimeout(() => { soundWin(); spawnConfetti(); }, 200);
        setTimeout(() => { if (window.showLanjut) showLanjut(); }, 600);
      } else if (board.every(c => c)) {
        statusEl.textContent = "It's a draw!";
        statusEl.className = 'winner';
        over = true;
        setActive(null);
        setTimeout(soundDraw, 100);
        setTimeout(() => { if (window.showLanjut) showLanjut(); }, 400);
      } else {
        current = current === BINUS ? ITB : BINUS;
        statusEl.textContent = current + "'s turn";
        statusEl.className = '';
        setActive(current);
      }
    }

    function checkWin() {
      for (const combo of wins)
        if (board[combo[0]] && board[combo[0]] === board[combo[1]] && board[combo[1]] === board[combo[2]])
          return combo;
      return null;
    }

    function setActive(player) {
      document.getElementById('player-binus').classList.toggle('active', player === BINUS);
      document.getElementById('player-itb').classList.toggle('active', player === ITB);
    }

    function reset() {
      board = Array(9).fill('');
      current = BINUS;
      over = false;
      if (animFrame) { cancelAnimationFrame(animFrame); c.clearRect(0, 0, canvas.width, canvas.height); }
      document.querySelectorAll('.cell').forEach(cell => {
        cell.innerHTML = '';
        cell.classList.remove('taken', 'win-cell');
      });
      const statusEl = document.getElementById('status');
      statusEl.textContent = "BINUS's turn";
      statusEl.className = '';
      setActive(BINUS);
    }
  </script>
  <script src="nav.js"></script>
</body>
</html>
